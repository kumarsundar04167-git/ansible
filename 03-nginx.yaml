---
- name: Install and configure Nginx 
  hosts: 44.222.207.151
  become: yes
  tasks:
    - name: Install Nginx package
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Ensure Nginx service is running and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes
