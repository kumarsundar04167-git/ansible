- name: conditions using ansible_facts
  hosts: frontend
  tasks:
   - name: print if redhat
      debug:
       msg: "os family is redhat, package manager is dnf"
     when: ansible_facts.os_family is == "redhat"

    - name: print if debian
       debug:
        msg: "os family is debian, package manager is apt-get"
      when: ansible_facts.os_family is == "debian"